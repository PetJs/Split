name: ✨ Feature Request
description: Suggest a new feature
labels: ["type/feature", "status/needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: willing
    attributes:
      label: Are you willing to implement this?
      options:
        - "Yes, I'd like to work on it"
        - "Maybe, with guidance"
        - "No, just suggesting"
    validations:
      required: true
