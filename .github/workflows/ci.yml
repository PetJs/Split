name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - name: Check changeset exists
        if: github.event_name == 'pull_request'
        run: pnpm changeset status --since=origin/main || echo "::warning::No changeset found. Add one with 'pnpm changeset' if this is a user-facing change."

  test:
    name: Test (Node)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  contracts:
    name: Test (Soroban Contracts)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "contracts -> target"
      - name: Check formatting
        working-directory: contracts
        run: cargo fmt --all -- --check
      - name: Clippy
        working-directory: contracts
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        working-directory: contracts
        run: cargo test
      - name: Build WASM
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, contracts]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
